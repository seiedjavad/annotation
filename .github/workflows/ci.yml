name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Avoid cancelling a main deploy mid-flight; PR builds can stay cancellable.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: write

defaults:
  run:
    working-directory: next-annotation-monorepo

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # GitHub project Pages URL is /<repo-name>/; must match at build time.
      NEXT_BASE_PATH: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: next-annotation-monorepo/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      # Pushes static files to branch gh-pages (no "Pages from Actions" API).
      # Repo Settings → Pages: Source "Deploy from a branch", branch gh-pages, folder / (root).
      - name: Publish site to gh-pages branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: next-annotation-monorepo/apps/web/out
          clean: true
